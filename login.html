<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>引线生产管理系统 - 登录</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/element-plus"></script>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
    }
    .login-bg {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
    }
    .login-header {
      text-align: center;
      margin-bottom: 36px;
    }
    .login-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }
    .login-title {
      font-size: 24px;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 8px;
    }
    .login-subtitle {
      font-size: 14px;
      color: #718096;
    }
    .login-error {
      background: #fed7d7;
      border: 1px solid #feb2b2;
      color: #c53030;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .form-label {
      font-size: 14px;
      font-weight: 600;
      color: #2d3748;
    }
    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 15px;
      transition: all 0.2s;
      outline: none;
    }
    .form-input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(102, 126, 234, 0.5);
    }
    .login-btn:active {
      transform: translateY(0);
    }
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: #a0aec0;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="login-bg">
      <div class="login-card">
        <div class="login-header">
          <div class="login-icon">
            <svg width="32" height="32" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
            </svg>
          </div>
          <h1 class="login-title">引线生产管理系统</h1>
          <p class="login-subtitle">请登录以访问数据</p>
        </div>

        <div v-if="errorMsg" class="login-error">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          {{ errorMsg }}
        </div>

        <form @submit.prevent="handleLogin" class="login-form">
          <div class="form-group">
            <label class="form-label">用户名</label>
            <input
              type="text"
              v-model="username"
              placeholder="请输入用户名"
              class="form-input"
              autocomplete="username"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label">密码</label>
            <input
              type="password"
              v-model="password"
              placeholder="请输入密码"
              class="form-input"
              autocomplete="current-password"
              required
            />
          </div>

          <button type="submit" class="login-btn" :disabled="loading">
            {{ loading ? '登录中...' : '登 录' }}
          </button>
        </form>

        <div class="login-footer">
          仅限授权人员访问
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref } = Vue;

    // Supabase 配置
    const SUPABASE_URL = 'https://oosktyjqqcgjvtjxyony.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9vc2t0eWpxcWNnanZ0anh5b255Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMjk3NjAsImV4cCI6MjA5MzkwNTc2MH0.Hc-7DC7vBJX8KjXpseZT56gf396GaMQQnxxwa9Be51c';

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    createApp({
      setup() {
        const username = ref('');
        const password = ref('');
        const loading = ref(false);
        const errorMsg = ref('');

        // 用户名转邮箱（兼容旧账号）
        const toEmail = (name) => {
          if (name.includes('@')) return name;
          // 先尝试新格式，登录失败后再尝试旧格式
          return name + '@local.dev';
        };

        // 兼容旧账号：尝试用常见后缀登录
        const tryLogin = async (email, password) => {
          return await supabaseClient.auth.signInWithPassword({ email, password });
        };

        const handleLogin = async () => {
          loading.value = true;
          errorMsg.value = '';

          const email = toEmail(username.value);

          try {
            let { data, error } = await tryLogin(email, password.value);

            // 如果新格式失败，尝试旧格式（xxx@123.com）
            if (error && error.message === 'Invalid login credentials') {
              const oldEmail = username.value + '@123.com';
              const result2 = await tryLogin(oldEmail, password.value);
              data = result2.data;
              error = result2.error;
            }

            if (error) {
              errorMsg.value = error.message === 'Invalid login credentials' ? '用户名或密码错误' : error.message;
              loading.value = false;
              return;
            }

            // 登录成功：获取用户资料（失败不影响登录）
            let userName = username.value;
            let userRole = 'user';
            try {
              const { data: userData } = await supabaseClient
                .from('users')
                .select('username, role')
                .eq('id', data.session.user.id)
                .single();
              if (userData) {
                userName = userData.username;
                userRole = userData.role;
              }
            } catch (e) {
              // users 表可能还没有该用户，使用默认值
            }

            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('username', userName);
            localStorage.setItem('userRole', userRole);
            localStorage.setItem('supabase_token', data.session.access_token);

            ElementPlus.ElMessage.success('登录成功！');
            window.location.href = 'admin.html';
          } catch (err) {
            errorMsg.value = '登录失败：' + err.message;
          } finally {
            loading.value = false;
          }
        };

        return {
          username,
          password,
          loading,
          errorMsg,
          handleLogin,
        };
      },
    }).use(ElementPlus).mount('#app');
  </script>
</body>
</html>
